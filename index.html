<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="main">

    <!-- IZQUIERDA (INVENTARIO) -->
    <div class="container">

        <img src="logo.png" class="logo">

        <h1>Inventario</h1>

        <div class="panel">
            <input type="text" id="nombre" placeholder="Producto">
            <input type="number" id="stock" placeholder="Stock">
            <input type="number" id="precio" placeholder="Precio">
            <input type="number" id="descuento" placeholder="Descuento %">

            <select id="categoria"></select>

            <button onclick="agregarCategoria()">+ Categoría</button>
            <button onclick="agregarProducto()">Agregar</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Stock</th>
                    <th>Precio</th>
                    <th>Desc</th>
                    <th>Total</th>
                    <th>Categoría</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla"></tbody>
        </table>

    </div>

    <!-- DERECHA (FIADOS) -->
    <div class="fiados">

        <h2>Gente que fió</h2>

        <div class="panel-fiados">
            <input type="text" id="nombreFiado" placeholder="Nombre">
            <input type="number" id="deudaFiado" placeholder="Total deuda">
            <button onclick="agregarFiado()">Agregar</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Deuda</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaFiados"></tbody>
        </table>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
