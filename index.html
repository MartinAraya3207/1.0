<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">

        <!-- LOGO -->
        <img src="logo.png" alt="Logo Mercadito" class="logo">

        <h1>Inventario</h1>

        <div class="formulario">
            <input type="text" id="nombre" placeholder="Producto">
            <input type="number" id="stock" placeholder="Stock">
            <button onclick="agregarProducto()">Agregar</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla"></tbody>
        </table>

        <!-- FOOTER -->
        <div class="footer">
            <p><strong>Dirección:</strong> Calle Inventario 123</p>
            <p><strong>Teléfono:</strong> +56 9 1234 5678</p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
</footer>
</body>
</html>
